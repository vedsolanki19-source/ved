<!DOCTYPE html>
<html>
    <body>

        <h2>My JavaScript FUNCTIONS</h2>
        <P> DO A CALCULATION AND THEN DISPLAY THE RESULT</P>
        <p id="demo"></p>
        <script>
            function ADD (a, b) {
                return a + b;
            }
            function AVERAGE (a, b) {
                return ADD (a , b) / 2;
            }
            let RESULT = AVERAGE(50,100);
            document.getElementById("demo").innerHTML = RESULT;
        </script>
    </body>
</html>
