<html>
<body>
    <h1>JavaScript Statements</h1>
    
    <p>A <b>JavaScript program</b> is a list of <b>statements</b> to be executed by the computer.</p>

    <p id="demo"></p>
    <script>
        var x = 5573; // This is a statement
        var y = 63463; // This is another statement
        var z = x * y; // This is yet another statement
        document.getElementById("demo").innerHTML = "The value of z is: " + z;
    </script>
</body>
</html>
