<!DOCTYPE html>
<html>
<head>
    <title>My delivery tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color:aliceblue;
            text-align: center;
            padding: 30px;
        }
        h1 (color:#ff5a43);
        button {
            background-color: #ff5a43;
            color: white;
            border: none;
            padding: 10px 25px;
            border: none;
            cursor: pointer;
        }
        div {
            border: 1px solid #ff5a43;
            width: 280px;
            margin: 6px auto;
            padding: 8px 12px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <h1>My delivery tracker</h1>
    <button onclick="saveOrder()">Save Order</button>
    <button onclick="Startdelivery()">Start Delivery</button>

    <div>JSON Text : <span id="jsonText"></span></div>
    <div>Loaded Items : <span id="loadedItems"></span></div>
    <div>Loaded price : <span id="loadedPrice"></span></div>
    <div> Status : <span id="Status"></span></div>
    <div> Result: <span id="result"></span></div>

    <script>
        function saveOrder() {
            var order = {
                items: ["Pizza", "Burger", "Soda"],
                price: 25.99,
                status: "Order Placed"
            };
            var jsonString = JSON.stringify(order);
            document.getElementById("jsonText").innerHTML = jsonString;
        }

        function Startdelivery() {
            var jsonString = document.getElementById("jsonText").innerHTML;
            var order = JSON.parse(jsonString);
            document.getElementById("loadedItems").innerHTML = order.items.join(", ");
            document.getElementById("loadedPrice").innerHTML = "$" + order.price;
            document.getElementById("Status").innerHTML = order.status;
            document.getElementById("result").innerHTML = "Delivery Started!";
        }

        async function fetchOrderStatus() {
            try {
                let response = await fetch('https://api.example.com/order/status');
                let data = await response.json();
                document.getElementById("Status").innerHTML = data.status;
            } catch (error) {
                console.error('Error fetching order status:', error);
            }
        }
        awaitdelay(3000);
        document.getElementById("Status").innerHTML = "Out for Delivery";
        awaitdelay(2000);
        document.getElementById("Status").innerHTML = "Delivered";
    </script>
</body>
</html>
